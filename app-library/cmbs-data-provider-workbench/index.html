<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CMBS Data Provider Workbench</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>CMBS Data Provider Workbench</h1>
      <p>CMBS data provider-style CMBS monitoring app powered by Deeploans + CRE ETL output.</p>
    </header>

    <main>
      <aside class="panel">
        <h2>Deeploans Integration</h2>
        <label>Data source
          <select id="sourceMode">
            <option value="etl">CRE ETL JSON (local)</option>
            <option value="api">Deeploans API (cre/deals)</option>
            <option value="sample">Sample</option>
          </select>
        </label>
        <label>Deeploans base URL
          <input id="baseUrl" value="http://localhost:8000" />
        </label>
        <label>API key (optional)
          <input id="apiKey" type="password" placeholder="x-algoritmica-api-key" />
        </label>
        <label>CRE ETL JSON path
          <input id="etlPath" value="../../etl-pipelines/ESMA-Loan-level-data-templates/commercial-real-estate/output/cre_normalized.json" />
        </label>
        <button id="loadBtn">Load CMBS universe</button>
      </aside>

      <section class="content">
        <section class="panel">
          <h2>Newsflash-Style Overview</h2>
          <div id="kpis" class="kpis"></div>
        </section>

        <section class="panel">
          <h2>Deal & Loan Monitor</h2>
          <div class="table-wrap"><table id="dealTable"></table></div>
        </section>

        <section class="panel">
          <h2>Risk Signals from Servicer Commentary</h2>
          <textarea id="commentary" rows="7" placeholder="Paste CMBS data provider-style commentary here..."></textarea>
          <button id="analyzeBtn">Extract signals</button>
          <ul id="signals"></ul>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
